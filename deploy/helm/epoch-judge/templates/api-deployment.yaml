apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "epoch-judge.fullname" . }}-api
  labels:
    {{- include "epoch-judge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "epoch-judge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "epoch-judge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "epoch-judge.fullname" . }}-config
            - secretRef:
                name: {{ include "epoch-judge.fullname" . }}-secret
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: testcases
              mountPath: {{ .Values.storage.local.root }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: testcases
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-testcases" (include "epoch-judge.fullname" .)) }}
      {{- end }}
