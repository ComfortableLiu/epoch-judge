apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "epoch-judge.fullname" . }}-config
  labels:
    {{- include "epoch-judge.labels" . | nindent 4 }}
data:
  # Database
  DB_HOST: {{ .Values.mysql.host | quote }}
  DB_PORT: {{ .Values.mysql.port | quote }}
  DB_USER: {{ .Values.mysql.user | quote }}
  DB_NAME: {{ .Values.mysql.database | quote }}
  DB_AUTO_MIGRATE: {{ .Values.mysql.autoMigrate | quote }}

  # Redis
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  REDIS_KEY_PREFIX: {{ .Values.redis.keyPrefix | quote }}

  # API
  API_PORT: "3000"
  CORS_ORIGINS: "*"
  TRUST_PROXY: "true"

  # JWT
  JWT_EXPIRES_IN: {{ .Values.auth.jwtExpiresIn | quote }}
  BCRYPT_ROUNDS: {{ .Values.auth.bcryptRounds | quote }}

  # Storage
  STORAGE_TYPE: {{ .Values.storage.type | quote }}
  {{- if eq .Values.storage.type "local" }}
  STORAGE_LOCAL_ROOT: {{ .Values.storage.local.root | quote }}
  {{- end }}
  {{- if eq .Values.storage.type "s3" }}
  S3_ENDPOINT: {{ .Values.storage.s3.endpoint | quote }}
  S3_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  S3_PREFIX: {{ .Values.storage.s3.prefix | quote }}
  S3_REGION: {{ .Values.storage.s3.region | quote }}
  {{- end }}

  # Throttle
  THROTTLE_ENABLED: {{ .Values.throttle.enabled | quote }}
  THROTTLE_TTL: {{ .Values.throttle.ttl | quote }}
  THROTTLE_LIMIT: {{ .Values.throttle.limit | quote }}
  THROTTLE_AUTH_LIMIT: {{ .Values.throttle.authLimit | quote }}
  THROTTLE_SUBMISSION_LIMIT: {{ .Values.throttle.submissionLimit | quote }}
  THROTTLE_STORAGE: {{ .Values.throttle.storage | quote }}

  # Judge
  JUDGE_GRPC_PORT: "50051"
  JUDGE_RECOVER_ON_STARTUP: "true"
