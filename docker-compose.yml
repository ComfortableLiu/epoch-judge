services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: epoch_judge
      MYSQL_USER: epoch
      MYSQL_PASSWORD: epoch_secret
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-epoch_redis_secret}
    command: ['sh', '-c', 'redis-server --requirepass "$$REDIS_PASSWORD"']
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: epoch
      DB_PASSWORD: epoch_secret
      DB_NAME: epoch_judge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-epoch_redis_secret}
      REDIS_KEY_PREFIX: epoch-judge
      STORAGE_LOCAL_ROOT: /app/data/testcases
    ports:
      - '3000:3000'
    volumes:
      - ./data/testcases:/app/data/testcases
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  judge:
    build:
      context: .
      dockerfile: docker/Dockerfile.judge
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: epoch
      DB_PASSWORD: epoch_secret
      DB_NAME: epoch_judge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-epoch_redis_secret}
      REDIS_KEY_PREFIX: epoch-judge
      STORAGE_LOCAL_ROOT: /app/data/testcases
      JUDGE_MOCK: 'false'
    volumes:
      - ./data/testcases:/app/data/testcases
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  mysql_data:
